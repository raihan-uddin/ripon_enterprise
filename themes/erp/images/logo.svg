<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">

  <!-- Diagonal slash accent -->
  <line x1="68" y1="8" x2="48" y2="112" stroke="#111111" stroke-width="2" opacity="0.15"/>

  <!-- Outer box -->
  <rect x="10" y="10" width="100" height="100" rx="2" fill="none" stroke="#111111" stroke-width="2"/>
  <!-- Inner inset box -->
  <rect x="16" y="16" width="88" height="88" rx="1" fill="none" stroke="#111111" stroke-width="1"/>

  <!-- Corner accents top-left -->
  <rect x="10" y="10" width="22" height="3" fill="#111111"/>
  <rect x="10" y="10" width="3" height="22" fill="#111111"/>

  <!-- Corner accents bottom-right -->
  <rect x="88" y="107" width="22" height="3" fill="#111111"/>
  <rect x="107" y="85" width="3" height="25" fill="#111111"/>

  <!-- RE letters -->
  <text x="60" y="90"
    text-anchor="middle"
    style="font-family:Georgia,'Times New Roman',serif;font-size:74px;font-weight:700;fill:#111111;letter-spacing:-3px;">RE</text>

  <!-- Horizontal rule -->
  <rect x="142" y="82" width="240" height="1.2" fill="#111111" opacity="0.5"/>

  <!-- EST. 2025 -->
  <text x="142" y="98"
    style="font-family:Georgia,'Times New Roman',serif;font-size:13px;font-weight:700;fill:#111111;letter-spacing:5px;">EST. 2015</text>

  <!-- Vertical divider -->
  <rect x="128" y="24" width="1" height="72" fill="#111111" opacity="0.3"/>

  <!-- RIPON -->
  <text x="142" y="52"
    style="font-family:Georgia,'Times New Roman',serif;font-size:17px;font-weight:700;fill:#111111;letter-spacing:6px;">RIPON</text>

  <!-- ENTERPRISE -->
  <text x="142" y="72"
    style="font-family:Georgia,'Times New Roman',serif;font-size:17px;font-weight:700;fill:#111111;letter-spacing:6px;">ENTERPRISE</text>



</svg>
