<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0f172a"/>

  <!-- Outer border -->
  <rect x="5" y="5" width="54" height="54" rx="7" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>

  <!-- Corner accent — top-left -->
  <rect x="5" y="5"  width="14" height="2.5" rx="1" fill="#6366f1"/>
  <rect x="5" y="5"  width="2.5" height="14" rx="1" fill="#6366f1"/>

  <!-- Corner accent — bottom-right -->
  <rect x="45" y="56.5" width="14" height="2.5" rx="1" fill="#6366f1"/>
  <rect x="56.5" y="45" width="2.5" height="14" rx="1" fill="#6366f1"/>

  <!-- RE letters -->
  <text x="32" y="46"
    text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="34"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-1">RE</text>

